<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Consensus</title>
<style>
	:root {
		--bg: #1b1d22;
		--panel: #25282f;
		--border: #383c46;
		--text: #e6e6e6;
		--dim: #9aa0aa;
		--accent: #5cc8ff;
		--moderator: #5cc8ff;
		--investigator: #f5c44a;
		--advocate: #6fdf8b;
		--critic: #ff8a80;
		--synthesizer: #c89cff;
		--system: #9aa0aa;
	}
	* { box-sizing: border-box; }
	body {
		margin: 0;
		font: 14px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
		background: var(--bg);
		color: var(--text);
	}
	header {
		padding: 12px 20px;
		background: #14161a;
		border-bottom: 1px solid var(--border);
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	header h1 { margin: 0; font-size: 18px; }
	header .who { color: var(--dim); font-size: 12px; }
	main { padding: 20px; max-width: 1100px; margin: 0 auto; }

	button, .btn {
		background: #2f333c;
		color: var(--text);
		border: 1px solid var(--border);
		padding: 6px 12px;
		font: inherit;
		border-radius: 4px;
		cursor: pointer;
	}
	button:hover { background: #383c46; }
	button.primary { background: var(--accent); color: #14161a; border-color: var(--accent); }
	button.danger { color: #ff8a80; }
	button.link-btn { background: none; border: none; color: var(--dim); padding: 0 6px; }
	button.link-btn:hover { color: var(--text); }

	#runs { list-style: none; padding: 0; margin: 12px 0 0 0; }
	#runs li {
		padding: 10px 12px;
		border: 1px solid var(--border);
		border-radius: 4px;
		margin-bottom: 6px;
		background: var(--panel);
		display: flex;
		gap: 12px;
		align-items: center;
	}
	#runs a { color: var(--text); text-decoration: none; flex: 1; }
	#runs a:hover { color: var(--accent); }
	#runs .meta { color: var(--dim); font-size: 12px; font-family: monospace; }
	#runs .empty { color: var(--dim); border-style: dashed; }

	#run-detail h2 { margin: 0 0 4px 0; }
	#run-meta { color: var(--dim); font-size: 12px; font-family: monospace; margin-bottom: 12px; }
	#run-controls { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
	#override-row { display: flex; gap: 8px; margin-bottom: 12px; }
	#override-input {
		flex: 1; padding: 6px 10px; background: var(--panel);
		color: var(--text); border: 1px solid var(--border); border-radius: 4px; font: inherit;
	}

	#transcript {
		background: var(--panel);
		border: 1px solid var(--border);
		border-radius: 4px;
		padding: 12px;
		max-height: 60vh;
		overflow-y: auto;
	}
	.turn {
		padding: 10px 12px;
		margin-bottom: 8px;
		background: #1f2228;
		border: 1px solid var(--border);
		border-left: 4px solid var(--border);
		border-radius: 4px;
	}
	.turn:last-child { margin-bottom: 0; }
	.turn .head {
		font-family: monospace;
		font-size: 12px;
		margin-bottom: 6px;
		cursor: pointer;
		user-select: none;
		display: flex;
		align-items: center;
		gap: 8px;
	}
	.turn .head:hover .actor { text-decoration: underline; }
	.turn .caret { color: var(--dim); width: 10px; display: inline-block; }
	.turn.collapsed .content { display: none; }
	.turn.collapsed { padding-bottom: 8px; }
	.turn .actor { font-weight: 600; }
	.turn .action { color: var(--dim); }
	.turn .tokens { color: var(--dim); margin-left: auto; font-size: 11px; }
	.turn-moderator    { border-left-color: var(--moderator); }
	.turn-investigator-1 { border-left-color: var(--investigator); }
	.turn-advocate-pro { border-left-color: var(--advocate); }
	.turn-advocate-con { border-left-color: var(--advocate); }
	.turn-critic       { border-left-color: var(--critic); }
	.turn-synthesizer  { border-left-color: var(--synthesizer); }
	.turn-system       { border-left-color: var(--system); }
	.turn-moderator    .actor { color: var(--moderator); }
	.turn-investigator-1 .actor { color: var(--investigator); }
	.turn-advocate-pro .actor { color: var(--advocate); }
	.turn-advocate-con .actor { color: var(--advocate); }
	.turn-critic       .actor { color: var(--critic); }
	.turn-synthesizer  .actor { color: var(--synthesizer); }
	.turn-system       .actor { color: var(--system); }
	.turn .content {
		margin: 0;
		font-family: inherit;
		font-size: 13px;
		color: var(--text);
	}
	.turn .content.plain { white-space: pre-wrap; }
	.turn .content p:first-child { margin-top: 0; }
	.turn .content p:last-child { margin-bottom: 0; }
	.turn .content pre {
		background: #14161a;
		border: 1px solid var(--border);
		border-radius: 4px;
		padding: 8px 10px;
		overflow-x: auto;
		font-family: monospace;
		font-size: 12px;
	}
	.turn .content code {
		background: #14161a;
		padding: 1px 4px;
		border-radius: 3px;
		font-family: monospace;
		font-size: 12px;
	}
	.turn .content pre code { background: none; padding: 0; }
	.turn .content blockquote {
		border-left: 3px solid var(--border);
		margin: 8px 0;
		padding: 0 10px;
		color: var(--dim);
	}
	.turn .content table { border-collapse: collapse; }
	.turn .content th, .turn .content td { border: 1px solid var(--border); padding: 4px 8px; }
	.turn.thinking { opacity: 0.85; }
	.turn.thinking .dots span {
		display: inline-block;
		animation: blink 1.2s infinite both;
	}
	.turn.thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
	.turn.thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
	@keyframes blink {
		0%, 80%, 100% { opacity: 0.2; }
		40% { opacity: 1; }
	}

	dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
	dialog::backdrop { background: rgba(0,0,0,0.6); }
	dialog h3 { margin-top: 0; }
	dialog label { display: block; margin: 8px 0; }
	dialog label span { display: block; margin-bottom: 4px; color: var(--dim); }
	dialog input, dialog textarea {
		width: 360px; padding: 6px 10px; background: #14161a; color: var(--text);
		border: 1px solid var(--border); border-radius: 4px; font: inherit;
	}
	dialog menu { display: flex; justify-content: flex-end; gap: 8px; padding: 0; margin: 16px 0 0 0; }
</style>
</head>
<body>
<header>
	<h1>Consensus</h1>
	<span class="who" id="who"></span>
</header>
<main>
	<section id="runs-list">
		<div style="display:flex;justify-content:space-between;align-items:center;">
			<h2 style="margin:0;">Runs</h2>
			<button class="primary" id="new-btn">New Run</button>
		</div>
		<ul id="runs"></ul>
	</section>

	<section id="run-detail" hidden>
		<button class="link-btn" id="back-btn">&larr; back to runs</button>
		<h2 id="run-issue"></h2>
		<div id="run-meta"></div>
		<div id="run-controls">
			<button id="start-btn" class="primary">Start / Resume</button>
			<button id="pause-btn">Pause</button>
			<button id="abort-btn">Abort</button>
			<button id="report-btn">Report</button>
			<button id="delete-btn" class="danger">Delete</button>
		</div>
		<div style="display:flex;justify-content:flex-end;margin-bottom:6px;">
			<button id="toggle-all-btn" class="link-btn">Collapse all</button>
		</div>
		<div id="override-row">
			<input id="override-input" placeholder="Directive for the moderator..." />
			<button id="override-btn">Send override</button>
		</div>
		<div id="transcript"></div>
	</section>
</main>

<dialog id="new-dialog">
	<form method="dialog" id="new-form">
		<h3>New Consensus Run</h3>
		<label><span>Issue</span><textarea name="Issue" required rows="3"></textarea></label>
		<label><span>LLM entity name</span><input name="Llm" required value="" /></label>
		<label><span>Max turns</span><input name="MaxTurns" type="number" value="40" min="1" /></label>
		<menu>
			<button value="cancel">Cancel</button>
			<button value="create" class="primary">Create &amp; Start</button>
		</menu>
	</form>
</dialog>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>
</body>
</html>
