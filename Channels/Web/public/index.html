<!DOCTYPE html>
<html ng-app="HiveApp">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Hive</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
	<link rel="stylesheet" href="css/theme.css">
</head>
<body ng-class="{ 'dark-theme': Theme === 'dark', 'scale-small': Scale === 'small', 'scale-large': Scale === 'large' }">

	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg" ng-controller="NavController">
		<div class="container-fluid">
			<a class="navbar-brand" href="#!/dashboard">
				<i class="bi bi-hexagon-fill"></i> Hive
			</a>

			<div class="navbar-nav me-auto" ng-if="IsAuthenticated">
				<a class="nav-link" ng-class="{ active: CurrentView === 'dashboard' }" href="#!/dashboard">Dashboard</a>
				<a class="nav-link" ng-class="{ active: CurrentView === 'management' }" href="#!/management">Management</a>
				<a class="nav-link" ng-class="{ active: CurrentView === 'chat' }" href="#!/chat">Chat</a>
			</div>

			<div class="navbar-nav" ng-if="IsAuthenticated">
				<!-- Scale selector -->
				<div class="nav-item dropdown">
					<a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">
						<i class="bi bi-aspect-ratio"></i>
					</a>
					<ul class="dropdown-menu dropdown-menu-end">
						<li><a class="dropdown-item" ng-click="SetScale('small')">Small</a></li>
						<li><a class="dropdown-item" ng-click="SetScale('normal')">Normal</a></li>
						<li><a class="dropdown-item" ng-click="SetScale('large')">Large</a></li>
					</ul>
				</div>

				<!-- Theme toggle -->
				<a class="nav-link" ng-click="ToggleTheme()" title="Toggle theme">
					<i class="bi" ng-class="Theme === 'dark' ? 'bi-sun' : 'bi-moon'"></i>
				</a>

				<!-- User menu -->
				<div class="nav-item dropdown">
					<a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#">
						<i class="bi bi-person-circle"></i> {{ UserName }}
					</a>
					<ul class="dropdown-menu dropdown-menu-end">
						<li><span class="dropdown-item-text text-muted">{{ UserRole }}</span></li>
						<li><hr class="dropdown-divider"></li>
						<li><a class="dropdown-item" ng-click="Logout()">Logout</a></li>
					</ul>
				</div>
			</div>
		</div>
	</nav>

	<!-- Main content -->
	<div ng-view class="container-fluid mt-3"></div>

	<!-- Scripts -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

	<!-- App -->
	<script src="js/app.js"></script>

	<!-- Services -->
	<script src="js/services/AuthService.js"></script>
	<script src="js/services/ApiService.js"></script>
	<script src="js/services/SseService.js"></script>
	<script src="js/services/SchemaService.js"></script>

	<!-- Controllers -->
	<script src="js/controllers/LoginController.js"></script>
	<script src="js/controllers/DashboardController.js"></script>
	<script src="js/controllers/ManagementController.js"></script>
	<script src="js/controllers/ChatController.js"></script>

	<!-- Directives -->
	<script src="js/directives/SchemaEditor.js"></script>
	<script src="js/directives/ChatMessage.js"></script>
	<script src="js/directives/TreeView.js"></script>

</body>
</html>
